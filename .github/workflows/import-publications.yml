name: Import Publications From Bibtex

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: ["main"]
    paths: ["publications.bib"]
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install academic==0.10.0

      - name: Import publications
        if: ${{ hashFiles('publications.bib') != '' }}
        run: academic import publications.bib content/publication/ --compact

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "content: import publications from Bibtex"
          title: "Import latest publications"
          body: "Auto-import publications from publications.bib"
          branch: hugoblox-import-publications
          delete-branch: true